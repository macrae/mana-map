<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mana Map</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link rel="stylesheet" href="css/mana-map.css">
</head>
<body>

<div class="toolbar">
  <h1>Mana Map</h1>
  <div>
    <label for="modeSelect">Mode</label>
    <select id="modeSelect">
      <option value="explore">Explore</option>
      <option value="build">Build Deck</option>
    </select>
  </div>
  <div>
    <label for="mapSelect">Map</label>
    <select id="mapSelect">
      <option value="default">Color + Type</option>
      <option value="ability">Abilities</option>
    </select>
  </div>
  <div>
    <label for="colorBy">Color by</label>
    <select id="colorBy">
      <option value="color">Primary Color</option>
      <option value="supertype">Supertype</option>
      <option value="rarity">Rarity</option>
    </select>
  </div>
  <div>
    <label for="search">Search</label>
    <input id="search" type="text" placeholder="Card name..." autocomplete="off">
  </div>
  <div class="toggles" id="toggles"></div>
</div>

<div class="main-area">
  <div id="plot"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-inner" id="detailInner"></div>
  </div>
  <div class="deck-panel" id="deckPanel">
    <div class="deck-inner" id="deckInner"></div>
  </div>
</div>

<div class="status" id="status">Loading...</div>

<script src="js/mana-map.js"></script>
<script src="js/deck-builder.js"></script>
</body>
</html>
